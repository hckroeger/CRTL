name: CI

# Runs on GitHub Actions.
on:
  push:
  pull_request:

# Least privilege: this workflow only reads the repo to build it.
permissions:
  contents: read

jobs:
  build:
    # Type-check, test, and build are OS-independent, so a single Linux runner is
    # enough. Pinned to Node 24 (current Active LTS), matching engines and the
    # CONTRIBUTING support claim.
    strategy:
      fail-fast: false
      matrix:
        node: [24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Regenerate bundled icons (must match what's committed)
        run: |
          npm run gen-icons
          git diff --exit-code src/icons.bundled.js \
            || (echo "::error::src/icons.bundled.js is stale - run 'npm run gen-icons' and commit the result." && exit 1)
      - name: Build single-file CRTL.html (local)
        run: npm run build
      - name: Build hosted web version
        run: npm run build:web
